spring:
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  mail:
    host: localhost
    port: 1025
    username:
    password:
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

app:
  jwt:
    secret: integration-test-secret-key-must-be-at-least-256-bits-long-for-hmac
    access-token-minutes: 15
    refresh-token-days: 30
  business:
    platform-fee-percentage: 5.0
    checkout-expiry-minutes: 30
    default-currency: COP
    default-tax-rate: 19.0
  base-url: http://localhost:8080

mercadopago:
  access-token: TEST-000000000000000-000000-00000000000000000000000000000000-000000000
  webhook-secret:
  sandbox: true
