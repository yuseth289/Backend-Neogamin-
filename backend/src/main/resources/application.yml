spring:
  application:
    name: neogaming-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/neogaming_dev}
    username: ${DB_USERNAME:neogaming}
    password: ${DB_PASSWORD:neogaming}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  flyway:
    enabled: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  cache:
    type: redis

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

server:
  port: ${SERVER_PORT:8080}

google:
  client-id: ${GOOGLE_CLIENT_ID:}

app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-minutes: ${JWT_ACCESS_TOKEN_MINUTES:15}
    refresh-token-days: ${JWT_REFRESH_TOKEN_DAYS:30}
  business:
    platform-fee-percentage: ${PLATFORM_FEE_PERCENTAGE:5.0}
    checkout-expiry-minutes: 30
    default-currency: COP
    default-tax-rate: 19.0
  base-url: ${APP_BASE_URL:http://localhost:8080}
  upload:
    dir: ${UPLOAD_DIR:uploads}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4000,http://localhost:4200}
  ai-service:
    base-url: ${AI_SERVICE_URL:http://localhost:8001}
    internal-token: ${AI_INTERNAL_SECRET}
    timeout-seconds: 45

mercadopago:
  access-token: ${MP_ACCESS_TOKEN}
  webhook-secret: ${MP_WEBHOOK_SECRET:}
  sandbox: ${MP_SANDBOX:true}
  # Porcentaje de comisión de la plataforma (marketplace_fee en COP)
  platform-fee-percentage: ${PLATFORM_FEE_PERCENTAGE:5.0}
  # URLs de retorno tras el pago en la interfaz de MP
  back-urls:
    success: ${FRONTEND_URL:http://localhost:4200}/checkout/result?status=success
    pending: ${FRONTEND_URL:http://localhost:4200}/checkout/result?status=pending
    failure: ${FRONTEND_URL:http://localhost:4200}/checkout/result?status=failed

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
