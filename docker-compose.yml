services:

  postgres:
    image: postgres:17-alpine
    container_name: neogaming-postgres
    environment:
      POSTGRES_DB: neogaming
      POSTGRES_USER: neogaming
      POSTGRES_PASSWORD: neogaming
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neogaming -d neogaming"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: neogaming-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  mailhog:
    image: mailhog/mailhog:latest
    container_name: neogaming-mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI — http://localhost:8025
    restart: unless-stopped

  ai-service:
    build:
      context: ./neogaming-ai-service
      dockerfile: Dockerfile
    container_name: neogaming-ai
    ports:
      - "8001:8001"
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      AI_INTERNAL_SECRET: ${AI_INTERNAL_SECRET}
      SPRING_BOOT_BASE_URL: http://backend:8080
      PORT: "8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/v1/ai/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: neogaming-backend
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/neogaming
      DB_USERNAME: neogaming
      DB_PASSWORD: neogaming
      JWT_SECRET: ${JWT_SECRET}
      MAIL_HOST: mailhog
      MAIL_PORT: "1025"
      AI_SERVICE_URL: http://ai-service:8001
      AI_INTERNAL_SECRET: ${AI_INTERNAL_SECRET}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      ai-service:
        condition: service_healthy
    restart: unless-stopped

  neogaming-front:
    build:
      context: ./front-neo
      dockerfile: Dockerfile
    image: neogaming-front:latest
    container_name: neogaming-front
    ports:
      - "4000:4000"
    environment:
      PORT: "4000"
      NODE_ENV: production
      BACKEND_URL: "http://backend:8080"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
