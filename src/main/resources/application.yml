spring:
  application:
    name: neogaming-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/neogaming_dev}
    username: ${DB_USERNAME:neogaming}
    password: ${DB_PASSWORD:neogaming}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:U7kzdCvs4yDw67pA4KSmeTfmHqtO1hz7Mva1FaP86hvpihkfvXtHiEbIUqF20vD6}
    access-token-minutes: ${JWT_ACCESS_TOKEN_MINUTES:15}
    refresh-token-days: ${JWT_REFRESH_TOKEN_DAYS:30}
  business:
    platform-fee-percentage: ${PLATFORM_FEE_PERCENTAGE:5.0}
    checkout-expiry-minutes: 30
    default-currency: COP
    default-tax-rate: 19.0
  base-url: ${APP_BASE_URL:http://localhost:8080}

mercadopago:
  access-token: ${MP_ACCESS_TOKEN:TEST-000000000000000-000000-00000000000000000000000000000000-000000000}
  webhook-secret: ${MP_WEBHOOK_SECRET:}
  sandbox: ${MP_SANDBOX:true}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
